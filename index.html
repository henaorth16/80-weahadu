<!DOCTYPE html>
<html lang="am">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>የአማርኛ መጽሐፍ ቅዱስ</title>
    <link rel="icon" href="bible-icon.svg">
    <!-- Tailwind (kept for utilities) -->
    <script>
        window.tailwind = {
            config: {
                darkMode: 'class',
                theme: {
                    extend: {}
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+Ethiopic:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Brand Colors */
            --primary-burgundy: #6B1F2A; /* Deep Burgundy */
            --accent-gold: #F4D38A; /* Gold / Sand */

            /* Parchment mode */
            --parchment-bg: #EFE9DF; /* soft off-white */
            --surface-white: #ffffff;

            /* Text */
            --text-primary: #241914; /* dark warm gray for readability */
            --text-secondary: #6b5a52;

            /* Navigation */
            --nav-bg-light: rgba(239, 233, 223, 0.95);
            --border-color-light: rgba(107,90,82,0.12);
            --hover-bg-light: rgba(0,0,0,0.03);

            /* Dark theme variants (kept compatible) */
            --bg-primary-dark: #121212;
            --bg-secondary-dark: #1e1e1e;
            --text-primary-dark: #e1e1e1;
            --text-secondary-dark: #a0a0a0;
            --nav-bg-dark: rgba(18, 18, 18, 0.9);
            --border-color-dark: rgba(255, 255, 255, 0.06);
            --hover-bg-dark: rgba(255, 255, 255, 0.03);
        }

        /* Base */
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Sans Ethiopic', 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--surface-white);
            color: var(--text-primary);
        }

        /* Hide Scrollbars but keep functionality */
        * {
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
        }

        *::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        /* --- App Top Header --- */
        #app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background-color: var(--nav-bg-light);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color-light);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        #app-title {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            letter-spacing: -0.5px;
        }

        #app-title h1 {
            font-size: 20px;
            margin: 0;
        }

        #app-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background-color: var(--hover-bg-light);
            border-color: var(--border-color-light);
        }

        #font-size-controls {
            display: flex;
            align-items: center;
            background: var(--hover-bg-light);
            border-radius: 14px;
            padding: 4px;
            gap: 2px;
        }

        #font-size-controls .control-btn {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
        }

        /* App container now sits below the fixed header */
        #app-container {
            height: 100vh;
            display: flex;
            padding-top: 64px;
            box-sizing: border-box;
        }

        /* NAV / sidebar */
        #nav-panel {
            width: 380px;
            min-width: 320px;
            background: var(--surface-white);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color-light);
            z-index: 60;
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Navigation Lists */
        #books-list,
        #chapters-list {
            list-style: none;
            margin: 0;
            padding: 8px 0;
            font-family: 'Inter', system-ui, sans-serif;
            flex-grow: 1;
            overflow-y: auto;
        }

        #books-list li,
        #chapters-list li {
            padding: 12px 24px;
            margin: 2px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            color: var(--text-primary-light);
        }

        #books-list li:hover,
        #chapters-list li:hover {
            background-color: var(--hover-bg-light);
            padding-left: 28px;
        }

        .active-item {
            background: var(--primary-burgundy) !important;
            color: var(--accent-gold) !important;
            box-shadow: 0 6px 18px rgba(107,31,42,0.18);
            font-weight: 700;
        }

        /* MAIN reading area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 48px 80px;
            background-color: var(--parchment-bg);
            scroll-behavior: smooth;
        }

        #main-content-area {
            max-width: 800px;
            margin: 0 auto;
        }

        #chapter-title {
            font-family: 'Noto Sans Ethiopic', serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 40px;
            color: var(--primary-burgundy);
            letter-spacing: -1px;
        }

        #text-container {
            font-family: 'Noto Sans Ethiopic', serif;
            font-size: 22px;
            line-height: 2;
            transition: font-size 0.3s ease;
            color: var(--text-primary);
        }

        #text-container p {
            margin-bottom: 24px;
            text-align: justify;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin: 48px 0 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color-light);
        }

        /* DARK MODE STYLES */
        /* DARK MODE STYLES */
        body.dark-mode {
            background-color: var(--bg-primary-dark);
            color: var(--text-primary-dark);
        }

        body.dark-mode #app-header {
            background-color: var(--nav-bg-dark);
            border-bottom: 1px solid var(--border-color-dark);
        }

        body.dark-mode #nav-panel {
            background-color: var(--bg-secondary-dark);
            border-right-color: var(--border-color-dark);
        }

        body.dark-mode main {
            background-color: var(--bg-primary-dark);
        }

        body.dark-mode .control-btn {
            color: var(--text-primary-dark);
        }

        body.dark-mode .control-btn:hover {
            background-color: var(--hover-bg-dark);
            border-color: var(--border-color-dark);
        }

        body.dark-mode #font-size-controls {
            background: var(--hover-bg-dark);
        }

        body.dark-mode #books-list li,
        body.dark-mode #chapters-list li {
            color: var(--text-primary-dark);
        }

        body.dark-mode #books-list li:hover,
        body.dark-mode #chapters-list li:hover {
            background-color: var(--hover-bg-dark);
        }

        body.dark-mode .active-item {
            background: var(--primary-burgundy) !important;
            color: #000000 !important;
            box-shadow: 0 4px 12px rgba(107,31,42,0.35);
        }

        body.dark-mode #chapter-title {
            color: var(--accent-color-dark);
        }

        body.dark-mode .section-title {
            border-bottom-color: var(--border-color-dark);
        }

        /* Responsive Design */
        @media (max-width: 820px) {
            #mobile-menu-btn {
                display: flex !important;
            }

            #nav-panel {
                position: fixed;
                top: 64px;
                left: 0;
                bottom: 0;
                width: 85%;
                max-width: 320px;
                transform: translateX(-100%);
                z-index: 2000;
                border-top: 1px solid var(--border-color-light);
            }

            #nav-panel.open {
                transform: translateX(0);
                box-shadow: 20px 0 50px rgba(0, 0, 0, 0.2);
            }

            body.dark-mode #nav-panel.open {
                box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            }

            main {
                padding: 32px 20px;
            }

            #chapter-title {
                font-size: 32px;
            }

            #text-container {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <!-- New Top Header -->
    <header id="app-header">
        <div style="display: flex; align-items: center; gap: 8px;">
            <button id="mobile-menu-btn" aria-label="Menu" title="Menu" class="control-btn" style="display: none;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <div id="app-title">
                <span style="font-size: 26px; color: var(--primary-burgundy);">✠</span>
                <h1>የአማርኛ መጽሐፍ ቅዱስ</h1>
            </div>
        </div>
        <div id="app-controls">
            <div id="font-size-controls">
                <button class="control-btn" id="decrease-font" title="Decrease Font Size">A-</button>
                <button class="control-btn" id="increase-font" title="Increase Font Size">A+</button>
            </div>
            <button class="control-btn" id="theme-toggle" title="Toggle Theme">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2"></svg>
            </button>
        </div>
    </header>




    <div id="app-container">
        <!-- NAV -->
        <nav id="nav-panel" aria-label="መጽሐፍ እና ምዕራፎች">
            <div
                style="height:64px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border-color-light);">
                <h2 style="font-size: 18px; font-weight: 700; letter-spacing: -0.2px;">መጽሐፍት</h2>
            </div>

            <div style="display:flex; flex:1; overflow:hidden;">
                <aside id="books-sidebar"
                    style="width:50%; border-right:1px solid var(--border-color-light); display:flex; flex-direction:column;">
                    <div style="display:flex; align-items:center; border-bottom:1px solid var(--border-color-light); padding: 8px;">
                        <button id="old-testament-tab" class="w-1/2 p-3 text-center"
                            style="background:transparent; border:none; font-weight:700; border-radius: 8px; cursor: pointer; transition: all 0.2s;">ብሉይ</button>
                        <button id="new-testament-tab" class="w-1/2 p-3 text-center"
                            style="background:transparent; border:none; font-weight:700; border-radius: 8px; cursor: pointer; transition: all 0.2s;">አዲስ</button>
                    </div>
                    <ul id="books-list"></ul>
                </aside>

                <aside id="chapters-sidebar" style="width:50%; display:flex; flex-direction:column;">
                    <h2 style="margin:0; padding:14px 18px; font-weight:700;">ምዕራፎች</h2>
                    <ul id="chapters-list"></ul>
                </aside>
            </div>

        </nav>

        <!-- MAIN -->
        <main>
            <div id="main-content-area">
                <h2 id="chapter-title"></h2>
                <div id="text-container">
                    <div id="initial-message">
                        <p style="font-size:18px;">በመጫን ላይ...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // All JavaScript logic remains the same...
            // --- CONSTANTS & DOM ELEMENTS ---
            const body = document.body;
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const navPanel = document.getElementById('nav-panel');
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const decreaseFontBtn = document.getElementById('decrease-font');
            const increaseFontBtn = document.getElementById('increase-font');
            const textContainerEl = document.getElementById('text-container');
            const booksListEl = document.getElementById('books-list');
            const chaptersListEl = document.getElementById('chapters-list');
            const chapterTitleEl = document.getElementById('chapter-title');
            const initialMessageEl = document.getElementById('initial-message');
            const oldTestamentTab = document.getElementById('old-testament-tab');
            const newTestamentTab = document.getElementById('new-testament-tab');

            // --- ICONS ---
            const sunIcon = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="5"/>`;
            const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;


            // --- STATE ---
            let ALL_BOOKS_DATA = [];
            let BOOKS = [];
            let currentTestament = 'old';
            let currentBookData = null;
            let currentBookNumber = -1;
            let currentChapterNumber = -1;
            let currentFontSize = 20;

            // --- THEME & SETTINGS ---
            function applyTheme(theme) {
                if (theme === 'dark') {
                    body.classList.add('dark-mode');
                    themeIcon.innerHTML = sunIcon;
                } else {
                    body.classList.remove('dark-mode');
                    themeIcon.innerHTML = moonIcon;
                }
                localStorage.setItem('theme', theme);
            }

            function toggleTheme() {
                const currentTheme = body.classList.contains('dark-mode') ? 'light' : 'dark';
                applyTheme(currentTheme);
            }

            function applyFontSize(size) {
                size = Math.max(14, Math.min(32, size));
                textContainerEl.style.fontSize = `${size}px`;
                currentFontSize = size;
                localStorage.setItem('fontSize', size);
            }


            // --- UI & EVENT LISTENERS ---
            mobileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                navPanel.classList.toggle('open');
            });

            themeToggleBtn.addEventListener('click', toggleTheme);
            increaseFontBtn.addEventListener('click', () => applyFontSize(currentFontSize + 2));
            decreaseFontBtn.addEventListener('click', () => applyFontSize(currentFontSize - 2));


            // --- BIBLE LOGIC ---
            function saveCurrentState() {
                if (currentBookNumber > 0 && currentChapterNumber > 0) {
                    localStorage.setItem('bibleReaderState', JSON.stringify({
                        bookNumber: currentBookNumber,
                        chapterNumber: currentChapterNumber,
                        testament: currentTestament
                    }));
                }
            }

            function loadSavedState() {
                const savedStateJSON = localStorage.getItem('bibleReaderState');
                return savedStateJSON ? JSON.parse(savedStateJSON) : null;
            }

            function loadBookList(testament) {
                booksListEl.innerHTML = '';
                const filteredBooks = BOOKS.filter(book => book.testament === testament);
                filteredBooks.forEach(book => {
                    const li = document.createElement('li');
                    li.textContent = book.am_name;
                    li.dataset.bookNumber = book.number;
                    li.addEventListener('click', () => {
                        handleBookSelection(book, 1);
                        if (window.innerWidth <= 820) navPanel.classList.remove('open');
                    });
                    booksListEl.appendChild(li);
                });
            }

            function loadChapterList(chapters) {
                chaptersListEl.innerHTML = '';
                chapters.forEach(chapter => {
                    const li = document.createElement('li');
                    li.textContent = `ምዕራፍ ${chapter.chapter}`;
                    li.dataset.chapterNumber = chapter.chapter;
                    li.addEventListener('click', () => {
                        handleChapterSelection(chapter.chapter);
                        if (window.innerWidth <= 820) navPanel.classList.remove('open');
                    });
                    chaptersListEl.appendChild(li);
                });
            }

            async function handleBookSelection(book, chapterToLoad = 1) {
                if (!book) return;
                currentBookNumber = book.number;
                currentBookData = ALL_BOOKS_DATA.find(b => b.book_number === currentBookNumber);

                updateActiveBook();
                loadChapterList(currentBookData.chapters);

                let chapterNumToLoad = chapterToLoad === 'last' && currentBookData.chapters.length > 0 ?
                    currentBookData.chapters[currentBookData.chapters.length - 1].chapter :
                    chapterToLoad;

                if (currentBookData.chapters.length > 0) {
                    handleChapterSelection(chapterNumToLoad);
                }
            }

            function handleChapterSelection(chapterNum) {
                const chapterData = currentBookData.chapters.find(c => c.chapter === chapterNum);
                if (chapterData) {
                    currentChapterNumber = chapterNum;
                    displayChapter(chapterData);
                    updateActiveChapter();
                    saveCurrentState();
                }
            }

            function displayChapter(chapterData) {
                chapterTitleEl.textContent = `${currentBookData.book_name_am} - ምዕራፍ ${chapterData.chapter}`;
                textContainerEl.innerHTML = '';
                initialMessageEl.style.display = 'none';

                chapterData.sections.forEach(section => {
                    if (section.title) {
                        const h2 = document.createElement('h2');
                        h2.className = 'section-title';
                        h2.textContent = section.title;
                        textContainerEl.appendChild(h2);
                    }
                    if (section.verses) {
                        section.verses.forEach(verse => {
                            const p = document.createElement('p');
                            const verseNum = document.createElement('sup');
                            verseNum.textContent = verse.verse;
                            verseNum.style.marginRight = '8px';
                            verseNum.style.fontWeight = 'bold';
                            p.appendChild(verseNum);
                            p.append(verse.text);
                            textContainerEl.appendChild(p);
                        });
                    }
                });
            }

            function updateActiveBook() {
                document.querySelectorAll('#books-list li').forEach(item => {
                    item.classList.remove('active-item');
                    if (parseInt(item.dataset.bookNumber) === currentBookNumber) {
                        item.classList.add('active-item');
                    }
                });
            }

            function updateActiveChapter() {
                document.querySelectorAll('#chapters-list li').forEach(item => {
                    item.classList.remove('active-item');
                    if (parseInt(item.dataset.chapterNumber) === currentChapterNumber) {
                        item.classList.add('active-item');
                        item.scrollIntoView({
                            behavior: 'smooth',
                            block: 'center'
                        });
                    }
                });
            }

            function switchTestament(testamentToShow) {
                currentTestament = testamentToShow;
                loadBookList(currentTestament);
                chaptersListEl.innerHTML = '';
                chapterTitleEl.textContent = '';
                initialMessageEl.style.display = 'block';
                currentBookNumber = -1;
                currentBookData = null;

                const isActiveDark = body.classList.contains('dark-mode');
                const activeBg = isActiveDark ? 'var(--accent-color-dark)' : 'var(--accent-color-light)';
                const activeColor = isActiveDark ? '#000000' : '#ffffff';
                const inactiveColor = isActiveDark ? 'var(--text-secondary-dark)' : 'var(--text-secondary-light)';

                if (testamentToShow === 'old') {
                    oldTestamentTab.style.backgroundColor = activeBg;
                    oldTestamentTab.style.color = activeColor;
                    newTestamentTab.style.backgroundColor = 'transparent';
                    newTestamentTab.style.color = inactiveColor;
                } else {
                    newTestamentTab.style.backgroundColor = activeBg;
                    newTestamentTab.style.color = activeColor;
                    oldTestamentTab.style.backgroundColor = 'transparent';
                    oldTestamentTab.style.color = inactiveColor;
                }
            }

            async function initializeApp() {
                applyTheme(localStorage.getItem('theme') || 'dark');
                applyFontSize(parseInt(localStorage.getItem('fontSize'), 10) || 20);

                try {
                    const response = await fetch('./minified/80-weahadu.json');
                    if (!response.ok) throw new Error('Bible data could not be loaded.');
                    ALL_BOOKS_DATA = await response.json();
                    BOOKS = ALL_BOOKS_DATA.map(book => ({
                        number: book.book_number,
                        am_name: book.book_name_am,
                        testament: book.testament
                    }));

                    oldTestamentTab.addEventListener('click', () => switchTestament('old'));
                    newTestamentTab.addEventListener('click', () => switchTestament('new'));

                    const savedState = loadSavedState();
                    if (savedState && savedState.bookNumber) {
                        const book = BOOKS.find(b => b.number === savedState.bookNumber);
                        if (book) {
                            switchTestament(savedState.testament || 'old');
                            await handleBookSelection(book, savedState.chapterNumber);
                        }
                    } else {
                        switchTestament('old');
                        const firstBook = BOOKS.find(b => b.testament === 'old');
                        if (firstBook) await handleBookSelection(firstBook, 1);
                    }
                } catch (error) {
                    console.error("Initialization Failed:", error);
                    document.getElementById('app-container').innerHTML = `<div style="text-align:center; padding: 40px; color: red;"><strong>ስህተት፡</strong> ${error.message}</div>`;
                }
            }
            initializeApp();
        });
    </script>
</body>

</html>
